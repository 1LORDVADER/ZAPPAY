<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />
    <link rel="icon" type="image/png" sizes="32x32" href="https://d2xsxph8kpxj0f.cloudfront.net/310419663028620876/jWmfVYBaikHBYpPLbpiijG/zappay-favicon_96159834.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="https://d2xsxph8kpxj0f.cloudfront.net/310419663028620876/jWmfVYBaikHBYpPLbpiijG/zappay-favicon-192_5b381f45.png" />
    <link rel="apple-touch-icon" href="https://d2xsxph8kpxj0f.cloudfront.net/310419663028620876/jWmfVYBaikHBYpPLbpiijG/zappay-apple-touch-icon_2f3430a7.png" />
    <title>%VITE_APP_TITLE%</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="ZAPPAY connects licensed cannabis farmers with consumers nationwide. Secure payment processing, legal compliance, and just 5.2% commission." />
    <meta name="keywords" content="cannabis marketplace, cannabis payment processing, licensed cannabis farmers, legal marijuana, cannabis delivery, THC products" />
    <meta name="author" content="ZAPPAY" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://zappayus.co/" />
    <meta property="og:title" content="ZAPPAY - Payment Processing Platform for Cannabis, Hemp & Insurance" />
    <meta property="og:description" content="ZAPPAY powers transactions across the cannabis, hemp, and insurance supply chain. Legally, instantly, and at just 5.2%." />
    <meta property="og:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310419663028620876/jWmfVYBaikHBYpPLbpiijG/zappay-og-image_4d8a1947.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://zappayus.co/" />
    <meta property="twitter:title" content="ZAPPAY - Payment Processing Platform for Cannabis, Hemp & Insurance" />
    <meta property="twitter:description" content="ZAPPAY powers transactions across the cannabis, hemp, and insurance supply chain. Legally, instantly, and at just 5.2%." />
    <meta property="twitter:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310419663028620876/jWmfVYBaikHBYpPLbpiijG/zappay-og-image_4d8a1947.png" />
    
    <!-- Additional SEO -->
    <link rel="canonical" href="https://zappayus.co/" />
    <meta name="theme-color" content="#1e3a8a" />

    <!-- Meta (Facebook) Pixel Base Code -->
    <!-- Replace YOUR_PIXEL_ID with your actual Meta Pixel ID when running ads -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      // fbq('init', 'YOUR_PIXEL_ID'); // Uncomment and replace with your Pixel ID
      // fbq('track', 'PageView');     // Uncomment when Pixel ID is set
    </script>
    <noscript>
      <!-- <img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=YOUR_PIXEL_ID&ev=PageView&noscript=1" /> -->
    </noscript>
    <!-- End Meta Pixel Code -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"
    ></script>
  </body>
</html>
