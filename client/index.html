<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />
    <link rel="icon" type="image/png" href="%VITE_APP_LOGO%" />
    <link rel="apple-touch-icon" href="%VITE_APP_LOGO%" />
    <title>%VITE_APP_TITLE%</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="ZAPPAY - America's premier cannabis marketplace connecting licensed farmers directly with consumers. Shop premium flower, edibles, concentrates, and pre-rolls with instant payment processing, 5.2% commission, and legal compliance across all 50+ states." />
    <meta name="keywords" content="cannabis marketplace, buy cannabis online, legal marijuana, cannabis payment processing, licensed cannabis farmers, cannabis dispensary, THC products, CBD products, cannabis delivery, weed marketplace, marijuana payment processor" />
    <meta name="author" content="ZAPPAY" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://zappayus.co/" />
    <meta property="og:title" content="ZAPPAY - Premium Cannabis Marketplace & Payment Platform" />
    <meta property="og:description" content="Connect with licensed cannabis farmers across America. Shop premium cannabis products with secure payment processing, instant delivery, and full legal compliance. Just 5.2% commission." />
    <meta property="og:image" content="%VITE_APP_LOGO%" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://zappayus.co/" />
    <meta property="twitter:title" content="ZAPPAY - Premium Cannabis Marketplace & Payment Platform" />
    <meta property="twitter:description" content="America's premier cannabis marketplace connecting licensed farmers with consumers. Secure payments, instant delivery, full legal compliance." />
    <meta property="twitter:image" content="%VITE_APP_LOGO%" />
    
    <!-- Additional SEO -->
    <link rel="canonical" href="https://zappayus.co/" />
    <meta name="theme-color" content="#1e3a8a" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"
    ></script>
  </body>
</html>
